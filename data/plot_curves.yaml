version: 1
sources:
- name: Reagan et al. (2016) six emotional arcs
  url: https://arxiv.org/abs/1606.07772
  use: Base macro arc families for reusable curve shapes.
- name: Save the Cat - 15 beats
  url: https://savethecat.com/wp-content/uploads/2019/07/STC_Crash_Course_Essential_Vocabulary.pdf
  use: Beat timing windows (Catalyst, Midpoint, All Is Lost, Finale) and act rhythm.
- name: Save the Cat - beat list
  url: https://savethecat.com/wp-content/uploads/2013/12/STC_BeatSheetRev3.pdf
  use: Canonical beat sequence names for curve constraints.
- name: Story Grid - thriller obligatory moments
  url: https://storygrid.com/724/
  use: Thriller/suspense convention anchors (clock, red herrings, false ending, mercy scene).
- name: Story Grid - thriller cheat sheet
  url: https://storygrid.com/wp-content/uploads/2023/02/Thriller-Guide.pdf
  use: Life/Death global value and climactic stress profile.
- name: Story Grid - love story cheat sheet
  url: https://storygrid.com/wp-content/uploads/2017/04/Love-Story-Cheat-Sheet.pdf
  use: Romance obligatory moments and reunion-oriented resolution profile.
- name: Romance Genre 101 - HEA/HFN expectation
  url: https://romancegenre101.com/faqs/
  use: Ending constraint for romance templates (HEA/HFN style resolution).
notes:
  interpretation: Tension values are normalized to [0.0, 1.0]. Curves are soft scaffolding for dynamic overlay, not rigid scripts.
  sampling: Each template uses 12 points corresponding to normalized story progress buckets (~8.3% each).
  genre_set:
  - sci-fi
  - mystery
  - romance
  - adventure
  - action
  - suspense
  - drama
  - fantasy
  - horror
  - thriller
global_overlay_contract:
  required_beat_windows:
    inciting_incident:
    - 0.1
    - 0.22
    midpoint_shift:
    - 0.45
    - 0.6
    all_is_lost:
    - 0.68
    - 0.84
    climax:
    - 0.78
    - 0.94
    resolution:
    - 0.9
    - 1.0
  overlay_policy:
    respect_curve_shape: true
    allow_local_replanning: true
    max_per_turn_tension_delta: 0.15
    minimum_climax_delta_above_setup: 0.35
    preserve_genre_obligatory_moments: true
