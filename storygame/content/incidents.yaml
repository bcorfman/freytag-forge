version: 1
incidents:
  - id: crowd_panic
    once_flag: incident_crowd_panic
    beat_tags: [inciting_incident, complication, setback]
    message: "A sudden panic sweeps the district, scattering witnesses and clues."
    entities: [crowd]
    effects:
      delta_progress: 0.02
      delta_tension: 0.08
      set_flags: [crowd_panic]
    triggers:
      min_turn: 3

  - id: ally_interrupted
    once_flag: incident_ally_interrupted
    beat_tags: [revelation, escalation, setback]
    message: "An ally is interrupted mid-briefing, forcing you to reconstruct the missing details."
    entities: [ally]
    effects:
      delta_progress: 0.02
      delta_tension: 0.09
      set_flags: [ally_interrupted]
    triggers:
      all:
        - action_type: talk

  - id: evidence_snatch
    once_flag: incident_evidence_snatch
    beat_tags: [confrontation, irreversible_choice, climax]
    message: "A shadowy figure attempts to snatch your key evidence and disappears into the crowd."
    entities: [evidence, saboteur]
    effects:
      delta_progress: 0.03
      delta_tension: 0.11
    triggers:
      all:
        - action_type: take
      any:
        - progress_at_least: 0.55
      not:
        - flag_is_true: finished

  - id: forged_directive
    once_flag: incident_forged_directive
    beat_tags: [revelation, escalation]
    message: "A forged directive appears, reframing the mission and casting doubt on your allies."
    entities: [directive]
    effects:
      delta_progress: 0.01
      delta_tension: 0.07
    triggers:
      sequence:
        within_turns: 6
        steps:
          - action_type: talk
          - action_type: take
          - action_type: move
      cooldown_turns: 4
